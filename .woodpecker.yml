steps:
  build-and-push:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      registry: https://registry.itxworks.eu
      repo: registry.itxworks.eu/notify-to-ntfy-push
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
        - ${CI_COMMIT_TAG}
      platforms: linux/amd64,linux/arm64
      insecure: true
      dockerfile: Dockerfile
    when:
     event: [ push, cron, manual, tag ]

  push-dockerhub:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      registry: https://index.docker.io/v1/
      repo: mp0185/notify-to-ntfy-push
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
        - ${CI_COMMIT_TAG}
      platforms: linux/amd64,linux/arm64
      dockerfile: Dockerfile
      username:
        from_secret: DOCKER_USERNAME
      password:
        from_secret: DOCKER_PASSWORD
    when:
      event: [push, cron, manual, tag]